name: checkers_app
description: Nearby multiplayer checkers via Bluetooth. No internet required.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  nearby_ble:
    path: ../../packages/nearby_ble
  game_framework:
    path: ../../packages/game_framework
  cupertino_icons: ^1.0.8
  in_app_review: ^2.0.9
  shared_preferences: ^2.3.0
  draughts_engine: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
