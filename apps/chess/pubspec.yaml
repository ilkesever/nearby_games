name: chess_app
description: Nearby multiplayer chess game using BLE.
publish_to: none
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  nearby_ble:
    path: ../../packages/nearby_ble
  game_framework:
    path: ../../packages/game_framework
  chess: ^0.8.1
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  in_app_review: ^2.0.9
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/pieces/
